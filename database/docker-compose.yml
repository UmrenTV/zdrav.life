services:
  postgres:
    image: postgres:16
    container_name: zdravlife-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: zdravlife_cms
      POSTGRES_USER: zdravlife
      POSTGRES_PASSWORD: your_strong_password_here
    ports:
      - "5432:5432"
    volumes:
      - zdravlife_postgres_data:/var/lib/postgresql/data

volumes:
  zdravlife_postgres_data: